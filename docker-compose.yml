services:
  app:
    build: .
    ports:
      - "${PORT:-3080}:3080"
    environment:
      DATABASE_URL: postgres://rabble:rabble@postgres:5432/rabble
      COOKIE_SECRET: ${COOKIE_SECRET:-dev-only-insecure-secret}
      # Set true when serving behind HTTPS
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Optional: default key for built-in Claude models
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional: enable recurring background work (retention sweeps, and —
      # once wired — automation schedules) via the Hatchet engine below.
      # Unset ⇒ scheduler stays off and retention still runs once at boot.
      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # /api/health pings the database; node ships no curl, so use node itself
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3080/api/health').then(r => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rabble
      POSTGRES_PASSWORD: rabble
      POSTGRES_DB: rabble
    ports:
      # Non-default host port so a locally installed Postgres on 5432
      # (Homebrew, Postgres.app) never shadows this container.
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rabble"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Recurring scheduler engine (opt-in). Start with:
  #   docker compose --profile hatchet up
  # then generate a client token from the Hatchet dashboard (:8888) and set
  # HATCHET_CLIENT_TOKEN for the app. Left in its own profile so the default
  # `docker compose up` stays a lean app + Postgres.
  hatchet:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    profiles: ["hatchet"]
    ports:
      - "8888:8888" # dashboard + API
      - "7077:7077" # gRPC engine
    environment:
      RABBLE_NOTE: "Configure per Hatchet docs; hatchet-lite bundles its own Postgres + RabbitMQ."
    restart: unless-stopped

volumes:
  pgdata:
