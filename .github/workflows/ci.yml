name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rabble
          POSTGRES_PASSWORD: rabble
          POSTGRES_DB: rabble
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rabble"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm --filter @rabble/e2e exec playwright install --with-deps chromium
      - run: pnpm --filter @rabble/e2e e2e
