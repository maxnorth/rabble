name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rabble
          POSTGRES_PASSWORD: rabble
          POSTGRES_DB: rabble
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U rabble"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # --with-deps runs apt-get update, which fails whenever the pre-
      # provisioned packages.microsoft.com repo serves a bad InRelease
      # ('Clearsigned file isn't valid') — and it has reddened several
      # otherwise-green commits. Playwright's deps come from the Ubuntu
      # archive, not that repo, so drop it first, then retry for good measure.
      - name: Install Playwright chromium (robust against flaky apt mirrors)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft* \
                     /etc/apt/sources.list.d/azure* 2>/dev/null || true
          for attempt in 1 2 3; do
            if pnpm --filter @rabblehq/e2e exec playwright install --with-deps chromium; then
              exit 0
            fi
            echo "::warning::playwright install failed (attempt $attempt); retrying in 15s"
            sleep 15
          done
          exit 1
      - run: pnpm --filter @rabblehq/e2e e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            packages/e2e/test-results/
            packages/e2e/artifacts/
          retention-days: 7
          if-no-files-found: ignore
