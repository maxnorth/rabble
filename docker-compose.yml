services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rabble
      POSTGRES_PASSWORD: rabble
      POSTGRES_DB: rabble
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rabble"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
