name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rabble
          POSTGRES_PASSWORD: rabble
          POSTGRES_DB: rabble
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U rabble"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # --with-deps runs apt-get, whose mirrors (packages.microsoft.com)
      # intermittently serve a bad InRelease and fail the whole build. Retry
      # a few times so a transient mirror hiccup doesn't red an otherwise
      # green commit.
      - name: Install Playwright chromium (retry on flaky apt mirrors)
        run: |
          for attempt in 1 2 3; do
            if pnpm --filter @rabblehq/e2e exec playwright install --with-deps chromium; then
              exit 0
            fi
            echo "::warning::playwright install failed (attempt $attempt); retrying in 15s"
            sleep 15
          done
          exit 1
      - run: pnpm --filter @rabblehq/e2e e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            packages/e2e/test-results/
            packages/e2e/artifacts/
          retention-days: 7
          if-no-files-found: ignore
